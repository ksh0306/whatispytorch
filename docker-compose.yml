services:
  gpu-dev-container:
    # 1. 빌드 설정: Dockerfile이 있는 경로(.)를 지정합니다.
    build:
      context: .
      dockerfile: Dockerfile
    image: pytorch-lab:v1.0
    
    # 컨테이너 이름 설정
    container_name: pytorch-lab
    
    # 2. 볼륨 마운트: [호스트 경로]:[컨테이너 내부 경로]
    # 현재 디렉토리의 code 폴더를 /workspace와 연결합니다.
    volumes:
      - ./workspace:/workspace
    
    # 3. 포트 포워딩: [호스트]:[컨테이너]
    # 호스트의 2222 포트로 접속하면 컨테이너의 22(SSH)로 연결됩니다.
    ports:
      - "2222:22"
    
    # 4. GPU 사용 설정 (NVIDIA Docker 런타임 필요)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    

